services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  FGTCLB\CategoryTypes\:
    resource: '../Classes/*'
    exclude: '../Classes/Domain/Model/*.php'

  FGTCLB\CategoryTypes\Registry\CategoryTypeRegistry:
    factory:
      - '@FGTCLB\CategoryTypes\Loader\CategoryTypeLoader'
      - 'load'